# Shangzitong (商资通) protected H5 + API locations.
# Insert these snippets into each existing TLS server block in
# /etc/nginx/conf.d/duizhangpingtai.conf. Add an HTTP redirect for /szt/ and
# /api/v1/ in the port-80 server block. Do NOT modify the existing root location.

# H5 static assets: Basic Auth gates the entry point.
location ^~ /szt/ {
    auth_basic "商资通";
    auth_basic_user_file /etc/nginx/.htpasswd-szt;
    alias /home/admin/szt-h5-current/;
    try_files $uri $uri/ /szt/index.html;
}

# Session bootstrap: the only API route behind Basic Auth. nginx injects the
# authenticated identity and the backend exchanges it for an HttpOnly cookie.
location ^~ /api/v1/auth/session {
    auth_basic "商资通";
    auth_basic_user_file /etc/nginx/.htpasswd-szt;
    client_max_body_size 10m;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Authenticated-User $remote_user;
    proxy_pass http://127.0.0.1:8800;
}

# All other API routes: protected by the szt_session cookie issued above, not
# by Basic Auth, so the browser is never re-prompted during SPA usage.
location ^~ /api/v1/ {
    client_max_body_size 10m;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Authenticated-User $remote_user;
    proxy_pass http://127.0.0.1:8800;
}
